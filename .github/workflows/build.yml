name: Multi-OS Ultimate Build

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        # Windows, Linux, Mac を並列で立ち上げる魔法
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            rid: win-x64
            suffix: .exe
          - os: ubuntu-latest
            rid: linux-x64
            suffix: -linux
          - os: macos-latest
            rid: osx-arm64 # M1/M2/M3 Mac用
            suffix: -mac

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          # csprojを監視してNETDLを回避
          cache-dependency-path: '**/*.csproj'

      - name: Publish
        # 各OSのRID（win-x64等）に合わせて1つのファイルに固める
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          --self-contained true 
          -p:PublishSingleFile=true 
          -o ./dist

      - name: Rename Artifact
        shell: bash
        # 出力ファイル名をOSごとに分かりやすくリネーム
        run: |
          cd dist
          mv ZeroSet${{ matrix.suffix == '.exe' && '.exe' || '' }} ZeroSet${{ matrix.suffix }} || mv ZeroSet ZeroSet${{ matrix.suffix }}

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Multi-OS Latest Build
          body: "Windows, Mac, Linux 全対応の爆速セットアップツールです。"
          files: ./dist/ZeroSet*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
