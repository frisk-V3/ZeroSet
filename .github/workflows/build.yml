name: Build and Release ZeroSet

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          # csprojを監視することでLockファイルなしでもキャッシュさせる
          cache-dependency-path: '**/*.csproj'

      - name: Publish (Single EXE)
        # フォルダ構造が深くならないよう、カレントの publish フォルダに出力
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 直下の publish フォルダからexeを探す
          files: ./publish/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Dev Build)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ZeroSet-EXE
          path: ./publish/*.exe
