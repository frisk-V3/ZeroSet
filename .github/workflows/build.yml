name: Auto Release ZeroSet

on:
  push:
    branches: [ main ] # mainにPushされたら即実行

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # これがRelease作成に絶対必要

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Publish (Single EXE)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          # タグ名を固定（latest）にして、毎回同じ場所にリリースを更新する
          tag_name: latest
          name: Latest Build
          body: "最新のビルド済みexeです。"
          files: ./publish/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
