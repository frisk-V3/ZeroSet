name: Build and Release

on:
  push:
    tags:
      - "v*" # v1.0 などのタグがPushされた時だけ実行

jobs:
  build:
    runs-on: windows-latest
    permissions: # Release作成に権限が必要
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true # これが「NETDLしない」爆速の肝

      - name: Publish (Single EXE)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.exe
          generate_release_notes: true # 変更点も自動で書いてくれる
